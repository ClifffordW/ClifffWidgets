<div class="container">
    <div class="bg"></div>
    <div class="kbg"></div>
    <div class="kbg2"></div>
    <div class="logo"></div>
    <div class="text"></div>
</div>

<style>
    /* 1. CONTAINER FOR 1024x1024 CENTERING */
    .container {
        position: relative;
        width: 1024px;
        height: 1024px;
        margin: 0 auto; /* Horizontal center */
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    :root
    {
        --col1: rgb(255, 123, 0);
        --col2: rgb(194, 103, 19);
        --col3: rgb(238, 137, 42);
        


    }


    /* 2. UPDATED KEYFRAMES WITH COLOR FADING */

    @keyframes drop-appear_reg {
        0% {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-360deg) translateY(5px) scale(0);
        }
        50% {
            filter: drop-shadow(0 0 0.80rem var(--glow3));
            transform: rotate(9deg) translateY(0px) scale(.95);
        }
        to {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-.3deg) translateY(5px) scale(1);
        }
    }

    @keyframes drop-animated_reg {
        0%, 100% {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-.3deg) translateY(5px) scale(1);
        }
        25% { 
            filter: drop-shadow(0 0 0.80rem var(--glow2)); 
        }
        50% {
            filter: drop-shadow(0 0 0.80rem var(--glow3));
            transform: rotate(0.3deg) translateY(0px) scale(.98);
        }
    }



    @keyframes drop-appear {
        0% {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-360deg) translateY(5px) scale(0);
            background-color: var(--col1); /* Darker starting color */
        }
        50% {
            filter: drop-shadow(0 0 0.80rem var(--glow3));
            transform: rotate(9deg) translateY(0px) scale(.95);
        }
        to {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-.3deg) translateY(5px) scale(1);
            background-color: var(--col2); /* Final color */
        }
    }

    @keyframes drop-animated {
        0%, 100% {
            filter: drop-shadow(0 0 0.50rem var(--glow1));
            transform: rotate(-.3deg) translateY(5px) scale(1);
            background-color: var(--col1); 
        }
        25% { 
            filter: drop-shadow(0 0 0.80rem var(--glow2)); 
            background-color: var(--col2); /* Fades to a lighter blue */
        }
        50% {
            filter: drop-shadow(0 0 0.80rem var(--glow3));
            transform: rotate(0.3deg) translateY(0px) scale(.98);
            background-color: var(--col3); /* Brightest point of fade */
        }
    }

    /* --- SHARED STYLES --- */
    .logo, .bg, .text, .kbg, .kbg2 {
        position: absolute;
        width: 85%;
        aspect-ratio: 16/9;

        animation-timing-function: ease-in-out;
        animation-iteration-count: 1, infinite;
        animation-name: drop-appear_reg, drop-animated_reg;
        animation-duration: 1.9s, 2.8s;
        animation-delay: 0s, 1.9s;

        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
    }

    .kbg, .kbg2

    {
        animation-name: drop-appear, drop-animated;
 
    }


    /* --- SVG ASSIGNMENTS --- */
    .bg { -webkit-mask-image: url(https://clifffordw.github.io/ClifffWidgets/KA/Alt/ka_backdrop.svg); background-color: rgb(0, 0, 0); }
    .kbg, .kbg2 { -webkit-mask-image: url(https://clifffordw.github.io/ClifffWidgets/KA/Alt/ka_kbg.svg); }
    .logo { -webkit-mask-image: url(https://clifffordw.github.io/ClifffWidgets/KA/Alt/ka_logo.svg); background-color: rgb(255, 255, 255); }
    .text { -webkit-mask-image: url(https://clifffordw.github.io/ClifffWidgets/KA/Alt/ka_text.svg); background-color: rgb(255, 255, 255); }

    /* --- COLOR OVERRIDES --- */
    /* Only the kbg elements get the color fade animation */
    .kbg, .kbg2 {
        /* We use the same animation but the background-color logic is inside them */
        display: var(--KBG, block);
    }

    .kbg2 {
        z-index: -1;
        opacity: 0.5; /* Makes the secondary kbg a bit softer */
    }
</style>
